services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      APP_NAME: Personal Expenses API
      DEBUG: "false"
      API_PREFIX: /api/v1
      CORS_ORIGINS: "*"
      PERSISTENCE_PROVIDER: postgres
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: expenses_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      OPENAI_MODEL: gpt-4o-mini
